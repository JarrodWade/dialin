<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dialin · explore</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      /* ── explore layout ────────────────────────────────────────────────── */
      .explore-body {
        display: flex; flex-direction: column;
        height: calc(100vh - 52px); overflow: hidden;
      }

      /* quick-ask strip */
      .ask-strip {
        border-bottom: 1px solid var(--line); background: var(--bg-2);
        padding: 10px 16px; display: flex; flex-direction: column; gap: 8px;
        flex-shrink: 0;
      }
      .ask-strip .ask-row { display: flex; gap: 8px; }
      .ask-strip input {
        flex: 1; background: var(--paper); color: var(--ink);
        border: 1px solid var(--line); border-radius: 8px;
        padding: 9px 12px; font-size: 14px;
      }
      .ask-strip button {
        background: var(--accent); color: var(--paper); border: none;
        border-radius: 8px; padding: 0 18px; cursor: pointer; font-size: 14px;
        white-space: nowrap;
      }
      .ask-strip button:disabled { opacity: 0.5; cursor: not-allowed; }
      .ask-reply {
        font-size: 13px; line-height: 1.55; color: var(--ink);
        background: #fffaf0; border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px;
        display: none; max-height: 120px; overflow-y: auto;
      }
      .ask-reply p { margin: 0 0 5px; }
      .ask-reply p:last-child { margin-bottom: 0; }
      .ask-reply code { background: var(--bg-2); border-radius: 3px; padding: 1px 4px; font-size: 11px; font-family: monospace; }
      .ask-reply.visible { display: block; }
      .ask-reply.loading { color: var(--muted); font-style: italic; }

      /* main grid — places left, visits right */
      .explore-grid {
        flex: 1; min-height: 0;
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 14px; padding: 14px;
      }
      .places-panel  { grid-column: 1; }
      .visits-panel  { grid-column: 2; }

      /* filter tabs inside places panel header */
      .place-filters {
        display: flex; gap: 4px; align-items: center;
      }
      .filter-btn {
        background: transparent; color: var(--muted);
        border: 1px solid var(--line); border-radius: 5px;
        padding: 2px 10px; font-size: 11px; cursor: pointer;
        white-space: nowrap; transition: background .1s, color .1s;
      }
      .filter-btn:hover  { background: var(--bg-2); color: var(--ink); }
      .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

      /* place list + rows */
      .place-list {
        padding: 8px 10px; overflow-y: auto; flex: 1;
        display: flex; flex-direction: column; gap: 2px;
      }
      .place-row {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 4px; border-bottom: 1px dashed var(--line); font-size: 13px;
      }
      .place-row:last-child { border-bottom: none; }
      .place-row .pname {
        font-weight: 600; color: var(--ink);
        display: flex; align-items: center; gap: 5px;
        flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .place-row .pcity { color: var(--muted); font-size: 12px; white-space: nowrap; }
      .place-row .actions { display: flex; gap: 4px; flex-shrink: 0; }
      .place-row .actions button {
        background: transparent; color: var(--accent); border: 1px solid var(--line);
        padding: 2px 7px; border-radius: 5px; font-size: 10px; cursor: pointer;
      }
      .place-row .actions button:hover { background: var(--bg-2); }
      .place-row .actions button.danger { color: var(--bad); }

      /* role badges */
      .badge {
        display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .4px;
        text-transform: uppercase; border-radius: 3px; padding: 1px 5px;
        vertical-align: middle; opacity: .85; flex-shrink: 0;
      }
      .badge-roaster { background: #4a7c59; color: #fff; }
      .badge-cafe    { background: var(--accent); color: #fff; }

      /* role picker inside add/edit place modal */
      .role-picker {
        display: flex; gap: 10px; grid-column: 1 / -1;
      }
      .role-opt {
        flex: 1; display: flex; align-items: flex-start; gap: 9px;
        border: 1.5px solid var(--line); border-radius: 8px;
        padding: 10px 12px; cursor: pointer;
        transition: border-color .15s, background .15s;
        text-transform: none; letter-spacing: 0; font-size: 13px;
      }
      .role-opt:has(input:checked) {
        border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--paper));
      }
      .role-opt input[type="checkbox"] {
        width: 15px; height: 15px; margin-top: 2px; flex-shrink: 0; cursor: pointer;
        accent-color: var(--accent);
      }
      .role-opt .role-label { display: flex; flex-direction: column; gap: 2px; }
      .role-opt .role-label strong { font-size: 13px; color: var(--ink); font-weight: 600; }
      .role-opt .role-label small  { font-size: 11px; color: var(--muted); }
      .role-opt input:disabled + .role-label { opacity: .6; }
    </style>
  </head>
  <body>
    <header>
      <h1>dialin <span>explore</span></h1>
      <nav class="page-nav">
        <a href="index.html">journal</a>
        <a href="explore.html" class="active">explore</a>
      </nav>
      <label>API <input id="api-base" placeholder="https://…execute-api.amazonaws.com" /></label>
      <span id="legacy-user-row" class="legacy-user-row">
        <label>User <input id="user-id" class="user" value="jarrod" /></label>
      </span>
      <div id="clerk-auth-root" class="clerk-auth-root" style="display: none;"></div>
      <div class="grow"></div>
      <button id="prefs-chip" class="prefs-chip" type="button" title="Edit preferences">
        <span class="dot"></span>
        <span class="text" id="prefs-chip-text">Set your taste preferences →</span>
        <span class="edit">edit</span>
      </button>
      <button id="refresh">Refresh</button>
      <button type="button" id="glossary-btn" class="ghost">Terms</button>
    </header>

    <div class="explore-body">
      <!-- Quick-ask bar -->
      <div class="ask-strip">
        <div class="ask-row">
          <input id="ask-input" placeholder="What should I check out in New York? Log my visit to Devoción today…" autocomplete="off" />
          <button id="ask-send">Ask</button>
        </div>
        <div id="ask-reply" class="ask-reply"></div>
      </div>

      <!-- Main content grid -->
      <div class="explore-grid">
        <!-- Places -->
        <section class="panel places-panel">
          <h2>
            my places
            <div class="place-filters">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="roasters">Roasters</button>
              <button class="filter-btn" data-filter="cafes">Cafes</button>
            </div>
            <div class="grow"></div>
            <button class="tiny" id="add-place-btn">+ add</button>
          </h2>
          <div id="place-list" class="place-list"></div>
        </section>

        <!-- Recent visits -->
        <section class="panel visits-panel">
          <h2>recent visits</h2>
          <div id="visit-list" class="visit-list"></div>
        </section>
      </div>
    </div>

    <!-- Add / edit place modal -->
    <div class="modal-bg" id="place-modal">
      <div class="modal" style="max-width: 520px;">
        <h3 id="place-modal-title">Add a place</h3>
        <form id="place-form" class="grid">
          <!-- Role picker — always first so context is set before fields -->
          <div class="role-picker">
            <label class="role-opt">
              <input type="checkbox" name="roleRoaster" />
              <span class="role-label">
                <strong>Roaster</strong>
                <small>sources / roasts beans you can buy</small>
              </span>
            </label>
            <label class="role-opt">
              <input type="checkbox" name="roleCafe" />
              <span class="role-label">
                <strong>Cafe</strong>
                <small>physical spot you can visit</small>
              </span>
            </label>
          </div>
          <label>Name<input name="name" required placeholder="Peixoto, Shoebox, Moxie…" /></label>
          <label>City<input name="city" placeholder="Chandler, AZ" /></label>
          <label>Country<input name="country" placeholder="US" value="US" /></label>
          <label>Website<input name="website" placeholder="https://…" /></label>
          <label class="full">Notes<textarea name="notes" placeholder="anything worth remembering…"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="place-submit">Add</button>
        </div>
      </div>
    </div>

    <!-- Duplicate place (cafe vs roaster) -->
    <div class="modal-bg" id="dup-place-modal">
      <div class="modal" style="max-width: 440px;">
        <h3>Already in your places</h3>
        <p id="dup-place-message" style="margin: 0 0 12px; font-size: 14px; line-height: 1.5; color: var(--ink);"></p>
        <p style="margin: 0; font-size: 12px; color: var(--muted);">
          One entry can cover both roles — edit the existing place instead of duplicating.
        </p>
        <div class="modal-actions" style="margin-top: 14px;">
          <button type="button" data-close>Cancel</button>
          <button type="button" id="dup-place-anyway">Create anyway</button>
          <button type="button" class="primary" id="dup-place-edit">Edit existing</button>
        </div>
      </div>
    </div>

    <!-- Log visit modal -->
    <div class="modal-bg" id="visit-modal">
      <div class="modal">
        <h3 id="visit-modal-title">Log a visit</h3>
        <form id="visit-form" class="grid">
          <input type="hidden" name="cafeId" />
          <input type="hidden" name="roasterId" />
          <input type="hidden" name="placeName" />
          <label>Date<input name="visitDate" type="date" /></label>
          <label>Rating (1-10)<input name="rating" type="number" min="1" max="10" /></label>
          <label class="full">Drinks ordered<input name="drinks" placeholder="V60 Ethiopia, cortado" /></label>
          <label class="full">Notes<textarea name="notes" placeholder="vibe, service, anything memorable…"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="visit-submit">Log visit</button>
        </div>
      </div>
    </div>

    <!-- Preferences modal -->
    <div class="modal-bg" id="prefs-modal">
      <div class="modal" style="min-width: 440px; max-width: 540px;">
        <h3>Taste preferences</h3>
        <form id="prefs-form" class="grid">
          <label>Home city<input name="homeCity" placeholder="Phoenix, AZ" /></label>
          <label>Roast level
            <select name="preferredRoastLevel">
              <option value="">—</option>
              <option value="light">light</option>
              <option value="medium-light">medium-light</option>
              <option value="medium">medium</option>
              <option value="medium-dark">medium-dark</option>
              <option value="dark">dark</option>
            </select>
          </label>
          <label class="full">Preferred origins
            <div class="chip-input-group" data-field="preferredOrigins">
              <input class="chip-input" placeholder="Ethiopia, Kenya…" />
            </div>
          </label>
          <label class="full">Preferred processes
            <div class="chip-input-group" data-field="preferredProcesses">
              <input class="chip-input" placeholder="washed, natural, anaerobic…" />
            </div>
          </label>
          <label class="full">Favorite roasters
            <div class="chip-input-group" data-field="favoriteRoasters">
              <input class="chip-input" placeholder="Sey, Shoebox, Dak…" />
            </div>
          </label>
          <label class="full">Favorite cafes
            <div class="chip-input-group" data-field="favoriteCafes">
              <input class="chip-input" placeholder="Devoción, Heart…" />
            </div>
          </label>
          <label class="full">Disliked notes
            <div class="chip-input-group" data-field="dislikedNotes">
              <input class="chip-input" placeholder="smoky, ashy…" />
            </div>
          </label>
          <label class="full">Notes<textarea name="notes" placeholder="anything else the bot should remember"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="prefs-submit">Save</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="dialin-config.js"></script>
    <script src="shared.js?v=5"></script>
    <script>
      // ── DOM refs ──────────────────────────────────────────────────────────
      const apiInput    = document.getElementById("api-base");
      const placeListEl = document.getElementById("place-list");
      const visitListEl = document.getElementById("visit-list");
      const placeModal     = document.getElementById("place-modal");
      const dupPlaceModal  = document.getElementById("dup-place-modal");
      const visitModal     = document.getElementById("visit-modal");
      const prefsModal     = document.getElementById("prefs-modal");
      const placeForm   = document.getElementById("place-form");
      const visitForm   = document.getElementById("visit-form");
      const prefsForm   = document.getElementById("prefs-form");
      const askInput    = document.getElementById("ask-input");
      const askSend     = document.getElementById("ask-send");
      const askReply    = document.getElementById("ask-reply");

      // ── state ─────────────────────────────────────────────────────────────
      // Unified place list; each entry has _type:"roaster"|"cafe" and _id added by JS
      let _placesCache      = [];
      let _cafeCache        = [];   // kept for visit name resolution
      let _roasterCache     = [];   // kept for visit name resolution
      let _activeFilter     = "all";
      let _editingPlaceId   = null;
      let _editingPlaceType = null; // "roaster" | "cafe"
      let _askHistory       = [];
      /** @type {null | { message: string, existingType: string, existingId: string, retry: object }} */
      let _dupContext = null;

      initSharedInputs(loadAll, loadAll);

      // ── filter tabs ───────────────────────────────────────────────────────
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          _activeFilter = btn.dataset.filter;
          renderPlaces(_placesCache);
        });
      });

      // ── quick-ask bar ─────────────────────────────────────────────────────
      async function doAsk() {
        const text = askInput.value.trim();
        if (!text || !apiInput.value.trim()) return;
        askInput.value = "";
        askSend.disabled = true;
        askReply.textContent = "thinking…";
        askReply.className = "ask-reply visible loading";
        try {
          const data = await api("/chat", {
            method: "POST",
            body: authedJsonBody({ message: text, history: _askHistory.slice(-6) }),
          });
          if (data.history) _askHistory = data.history.slice(-12);
          else _askHistory = [..._askHistory, { role: "USER", text }, { role: "BOT", text: data.reply }].slice(-12);
          askReply.innerHTML = "";
          renderMarkdown(askReply, data.reply || "(no reply)");
          askReply.className = "ask-reply visible";
          await loadPlaces(); loadVisits();
        } catch (err) {
          askReply.textContent = "Error: " + err.message;
          askReply.className = "ask-reply visible loading";
        } finally {
          askSend.disabled = false;
        }
      }
      askSend.addEventListener("click", doAsk);
      askInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doAsk(); } });

      // ── places ────────────────────────────────────────────────────────────
      async function loadPlaces() {
        if (!apiInput.value.trim()) return;
        try {
          const [rd, cd] = await Promise.all([
            api(withLegacyUserQuery("/roasters")),
            api(withLegacyUserQuery("/cafes")),
          ]);
          _roasterCache = rd.roasters || [];
          _cafeCache    = cd.cafes    || [];
          _placesCache  = [
            ..._roasterCache.map(r => ({ ...r, _type: "roaster", _id: r.roasterId })),
            ..._cafeCache.map(c => ({    ...c, _type: "cafe",    _id: c.cafeId    })),
          ].sort((a, b) => a.name.localeCompare(b.name));
          renderPlaces(_placesCache);
        } catch (err) {
          placeListEl.innerHTML = `<div class="empty">${err.message}</div>`;
        }
      }

      function placeRoles(p) {
        const actingAsRoaster = p._type === "roaster" || (p._type === "cafe" && p.isRoaster);
        const actingAsCafe    = p._type === "cafe"    || (p._type === "roaster" && p.hasCafe);
        return { actingAsRoaster, actingAsCafe };
      }

      function filterPlaces(places) {
        switch (_activeFilter) {
          case "roasters": return places.filter(p => placeRoles(p).actingAsRoaster);
          case "cafes":    return places.filter(p => placeRoles(p).actingAsCafe);
          default:         return places;
        }
      }

      function renderPlaces(all) {
        const items = filterPlaces(all);
        if (!items.length) {
          placeListEl.innerHTML = '<div class="empty">Nothing here yet — click + add or ask the bot.</div>';
          return;
        }
        placeListEl.innerHTML = "";
        items.forEach((p) => {
          const { actingAsRoaster, actingAsCafe } = placeRoles(p);
          const canVisit = actingAsCafe;

          const roasterBadge = actingAsRoaster ? '<span class="badge badge-roaster">roaster</span>' : "";
          const cafeBadge    = actingAsCafe    ? '<span class="badge badge-cafe">cafe</span>'       : "";
          // Show both badges only when the place has both roles
          const badges = (actingAsRoaster && actingAsCafe)
            ? roasterBadge + cafeBadge
            : actingAsRoaster ? roasterBadge : cafeBadge;

          const row = document.createElement("div");
          row.className = "place-row";
          row.innerHTML = `
            <div class="pname">${escapeHtml(p.name)}${badges}</div>
            ${p.city ? `<div class="pcity">${escapeHtml(p.city)}</div>` : ""}
            <div class="actions">
              ${canVisit ? `<button data-action="visit" data-id="${p._id}" data-type="${p._type}">+ Visit</button>` : ""}
              <button data-action="edit"   data-id="${p._id}" data-type="${p._type}">Edit</button>
              <button data-action="retire" data-id="${p._id}" data-type="${p._type}" class="danger">Retire</button>
            </div>
          `;
          placeListEl.appendChild(row);
        });

        placeListEl.querySelectorAll('[data-action="visit"]').forEach(btn => {
          btn.addEventListener("click", () => openVisitModal(btn.dataset.id, btn.dataset.type));
        });
        placeListEl.querySelectorAll('[data-action="edit"]').forEach(btn => {
          btn.addEventListener("click", () => {
            const p = _placesCache.find(x => x._id === btn.dataset.id);
            if (p) openEditPlaceModal(p);
          });
        });
        placeListEl.querySelectorAll('[data-action="retire"]').forEach(btn => {
          btn.addEventListener("click", async () => {
            const type = btn.dataset.type;
            const confirmMsg = type === "roaster"
              ? "Retire this roaster? It stays linked to past coffees."
              : "Retire this cafe?";
            if (!confirm(confirmMsg)) return;
            try {
              if (type === "roaster") {
                await api(`/roasters/${encodeURIComponent(btn.dataset.id)}`, {
                  method: "PATCH", body: authedJsonBody({ archived: true }),
                });
              } else {
                await api(`/cafes/${encodeURIComponent(btn.dataset.id)}`, {
                  method: "PATCH", body: authedJsonBody({ archived: true }),
                });
              }
              toast("Retired."); await loadPlaces();
            } catch (err) { toast(err.message, true); }
          });
        });
      }

      // ── place modal ───────────────────────────────────────────────────────
      function resetPlaceModal() {
        _editingPlaceId   = null;
        _editingPlaceType = null;
        placeForm.reset();
        placeForm.elements.country.value = "US";
        placeForm.elements.roleRoaster.disabled = false;
        placeForm.elements.roleCafe.disabled    = false;
        document.getElementById("place-modal-title").textContent = "Add a place";
        document.getElementById("place-submit").textContent = "Add";
      }

      function openEditPlaceModal(p) {
        resetPlaceModal();
        _editingPlaceId   = p._id;
        _editingPlaceType = p._type;
        placeForm.elements.name.value    = p.name    || "";
        placeForm.elements.city.value    = p.city    || "";
        placeForm.elements.country.value = p.country || "US";
        placeForm.elements.website.value = p.website || "";
        placeForm.elements.notes.value   = p.notes   || "";

        if (p._type === "roaster") {
          // Primary role is roaster — locked. Secondary cafe role is freely toggleable (hasCafe).
          placeForm.elements.roleRoaster.checked  = true;
          placeForm.elements.roleRoaster.disabled = true;
          placeForm.elements.roleCafe.checked     = !!p.hasCafe;
          placeForm.elements.roleCafe.disabled    = false;
        } else {
          // Primary role is cafe — locked. Secondary roaster role is freely toggleable (isRoaster).
          placeForm.elements.roleCafe.checked     = true;
          placeForm.elements.roleCafe.disabled    = true;
          placeForm.elements.roleRoaster.checked  = !!p.isRoaster;
          placeForm.elements.roleRoaster.disabled = false;
        }

        document.getElementById("place-modal-title").textContent = "Edit place";
        document.getElementById("place-submit").textContent = "Save";
        openModal(placeModal);
      }

      document.getElementById("add-place-btn").addEventListener("click", () => {
        resetPlaceModal(); openModal(placeModal);
      });

      document.getElementById("place-submit").addEventListener("click", () => submitPlaceForm({ skipDuplicateCheck: false }));

      document.getElementById("dup-place-edit").addEventListener("click", async () => {
        if (!_dupContext) return;
        const { existingType, existingId } = _dupContext;
        closeModal(dupPlaceModal);
        _dupContext = null;
        let p = _placesCache.find((x) => x._type === existingType && x._id === existingId);
        if (!p) {
          await loadPlaces();
          p = _placesCache.find((x) => x._type === existingType && x._id === existingId);
        }
        closeModal(placeModal);
        resetPlaceModal();
        if (p) openEditPlaceModal(p);
        else toast("Could not find that place — try Refresh.", true);
      });

      document.getElementById("dup-place-anyway").addEventListener("click", async () => {
        if (!_dupContext?.retry) return;
        closeModal(dupPlaceModal);
        const { isRoaster, isCafe, base } = _dupContext.retry;
        _dupContext = null;
        try {
          if (isRoaster) {
            await api("/roasters", {
              method: "POST",
              body: authedJsonBody({ ...base, hasCafe: isCafe, skipDuplicateCheck: true }),
            });
          } else {
            await api("/cafes", {
              method: "POST",
              body: authedJsonBody({ ...base, isRoaster: isRoaster, skipDuplicateCheck: true }),
            });
          }
          toast(isRoaster && isCafe ? "Added as roaster + cafe." : isRoaster ? "Roaster added." : "Cafe added.");
          closeModal(placeModal); resetPlaceModal(); await loadPlaces();
        } catch (err) { toast(err.message, true); }
      });

      async function submitPlaceForm({ skipDuplicateCheck }) {
        if (!placeForm.reportValidity()) return;
        const isRoaster = placeForm.elements.roleRoaster.checked;
        const isCafe    = placeForm.elements.roleCafe.checked;
        if (!isRoaster && !isCafe) {
          toast("Select at least one role (Roaster or Cafe).", true); return;
        }
        const fd  = new FormData(placeForm);
        const base = {
          name:    (fd.get("name") || "").trim(),
          city:    (fd.get("city") || "").trim()    || undefined,
          country: (fd.get("country") || "").trim() || "US",
          website: (fd.get("website") || "").trim() || undefined,
          notes:   (fd.get("notes") || "").trim()   || undefined,
        };
        const dupFlag = skipDuplicateCheck ? { skipDuplicateCheck: true } : {};
        try {
          if (_editingPlaceId) {
            if (_editingPlaceType === "roaster") {
              await api(`/roasters/${encodeURIComponent(_editingPlaceId)}`, {
                method: "PATCH",
                body: authedJsonBody({ ...base, hasCafe: isCafe }),
              });
            } else {
              await api(`/cafes/${encodeURIComponent(_editingPlaceId)}`, {
                method: "PATCH", body: authedJsonBody({ ...base, isRoaster: isRoaster }),
              });
            }
            toast("Saved.");
          } else if (isRoaster) {
            await api("/roasters", {
              method: "POST",
              body: authedJsonBody({ ...base, hasCafe: isCafe, ...dupFlag }),
            });
            toast(isRoaster && isCafe ? "Added as roaster + cafe." : "Roaster added.");
          } else {
            await api("/cafes", {
              method: "POST",
              body: authedJsonBody({ ...base, isRoaster: isRoaster, ...dupFlag }),
            });
            toast("Cafe added.");
          }
          closeModal(placeModal); resetPlaceModal(); await loadPlaces();
        } catch (err) {
          if (err.status === 409 && err.body?.code === "DUPLICATE_PLACE" && !skipDuplicateCheck) {
            _dupContext = {
              message: err.body.error || "A place with this name already exists in the other list.",
              existingType: err.body.existingType,
              existingId: err.body.existingId,
              retry: { isRoaster, isCafe, base },
            };
            document.getElementById("dup-place-message").textContent = _dupContext.message;
            openModal(dupPlaceModal);
            return;
          }
          toast(err.message, true);
        }
      }

      // ── visit modal ───────────────────────────────────────────────────────
      function openVisitModal(placeId, placeType) {
        visitForm.reset();
        visitForm.elements.visitDate.value = new Date().toISOString().slice(0, 10);
        const place = _placesCache.find(p => p._id === placeId);
        const placeName = place ? place.name : "";
        if (placeType === "roaster") {
          visitForm.elements.roasterId.value = placeId;
          visitForm.elements.cafeId.value    = "";
        } else {
          visitForm.elements.cafeId.value    = placeId;
          visitForm.elements.roasterId.value = "";
        }
        visitForm.elements.placeName.value = placeName;
        document.getElementById("visit-modal-title").textContent =
          "Log a visit" + (placeName ? ` — ${placeName}` : "");
        openModal(visitModal);
      }

      document.getElementById("visit-submit").addEventListener("click", async () => {
        const fd        = new FormData(visitForm);
        const cafeId    = (fd.get("cafeId")    || "").trim();
        const roasterId = (fd.get("roasterId") || "").trim();
        if (!cafeId && !roasterId) return;
        const body = {};
        if (cafeId)    body.cafeId    = cafeId;
        if (roasterId) body.roasterId = roasterId;
        const pn = (fd.get("placeName") || "").trim();
        if (pn) body.placeName = pn;
        const drinksRaw = (fd.get("drinks") || "").trim();
        if (drinksRaw) body.drinks = drinksRaw.split(",").map(s => s.trim()).filter(Boolean);
        if (fd.get("visitDate")) body.visitDate = fd.get("visitDate");
        if (fd.get("rating"))    body.rating    = parseInt(fd.get("rating"), 10);
        if (fd.get("notes"))     body.notes     = fd.get("notes").trim();
        try {
          await api("/visits", { method: "POST", body: authedJsonBody(body) });
          toast("Visit logged!"); closeModal(visitModal); await loadVisits();
        } catch (err) { toast(err.message, true); }
      });

      // ── visits ────────────────────────────────────────────────────────────
      async function loadVisits() {
        if (!apiInput.value.trim()) return;
        try {
          const data = await api(withLegacyUserQuery("/visits", "limit=15"));
          renderVisits(data.visits || []);
        } catch (err) {
          visitListEl.innerHTML = `<div class="empty">${err.message}</div>`;
        }
      }

      function renderVisits(items) {
        if (!items.length) {
          visitListEl.innerHTML = '<div class="empty">No visits logged yet.</div>';
          return;
        }
        visitListEl.innerHTML = "";
        items.forEach((v) => {
          // Prefer current cafe/roaster names so update_cafe / update_roaster renames
          // show immediately; fall back to stored placeName if the entity is missing
          // from cache (e.g. deleted row) or lists haven't loaded yet.
          let placeName = null;
          if (v.cafeId) {
            const c = _cafeCache.find((x) => x.cafeId === v.cafeId);
            placeName = c ? c.name : null;
          }
          if (!placeName && v.roasterId) {
            const r = _roasterCache.find((x) => x.roasterId === v.roasterId);
            placeName = r ? r.name : null;
          }
          placeName = placeName || v.placeName || v.cafeId || v.roasterId || "Unknown place";
          const row = document.createElement("div");
          row.className = "visit-row";
          row.innerHTML = `
            <div class="v-date">${fmtDate(v.visitDate || v.createdAt)}</div>
            <div class="v-body">
              <div class="v-cafe">${escapeHtml(placeName)}</div>
              ${v.drinks?.length ? `<div class="v-drinks">${v.drinks.map(d => escapeHtml(d)).join(", ")}</div>` : ""}
              ${v.notes ? `<div class="v-notes">${escapeHtml(v.notes)}</div>` : ""}
            </div>
            <div class="v-rating">${v.rating ? v.rating + "/10" : ""}</div>
          `;
          visitListEl.appendChild(row);
        });
      }

      // ── preferences ───────────────────────────────────────────────────────
      const CHIP_FIELDS = ["preferredOrigins","preferredProcesses","favoriteRoasters","favoriteCafes","dislikedNotes"];

      async function loadPreferences() {
        if (!apiInput.value.trim()) return;
        try {
          const data = await api(withLegacyUserQuery("/profile"));
          const p = data.profile || {};
          const parts = [];
          if (p.homeCity)               parts.push(p.homeCity);
          if (p.preferredRoastLevel)    parts.push(p.preferredRoastLevel + " roasts");
          if (p.preferredOrigins?.length) parts.push(p.preferredOrigins.slice(0,3).join(", "));
          document.getElementById("prefs-chip-text").textContent =
            parts.length ? parts.join(" · ") : "Set your taste preferences →";
        } catch { /* silent */ }
      }

      function renderChipField(field, values) {
        const group = prefsForm.querySelector(`.chip-input-group[data-field="${field}"]`);
        if (!group) return;
        group.querySelectorAll(".chip").forEach(c => c.remove());
        const input = group.querySelector(".chip-input");
        values.forEach((v) => {
          const chip = document.createElement("span");
          chip.className = "chip"; chip.dataset.value = v;
          chip.innerHTML = `${escapeHtml(v)}<button type="button" aria-label="remove">×</button>`;
          chip.querySelector("button").addEventListener("click", () => chip.remove());
          group.insertBefore(chip, input);
        });
      }
      function readChipField(field) {
        const group = prefsForm.querySelector(`.chip-input-group[data-field="${field}"]`);
        return group ? [...group.querySelectorAll(".chip")].map(c => c.dataset.value) : [];
      }

      document.getElementById("prefs-chip").addEventListener("click", async () => {
        if (!apiInput.value.trim()) return;
        try {
          const data = await api(withLegacyUserQuery("/profile"));
          const p = data.profile || {};
          prefsForm.elements.homeCity.value = p.homeCity || "";
          prefsForm.elements.preferredRoastLevel.value = p.preferredRoastLevel || "";
          prefsForm.elements.notes.value = p.notes || "";
          CHIP_FIELDS.forEach(f => renderChipField(f, p[f] || []));
          openModal(prefsModal);
        } catch (err) { toast(err.message, true); }
      });

      prefsForm.querySelectorAll(".chip-input-group").forEach((group) => {
        const input = group.querySelector(".chip-input");
        const field = group.dataset.field;
        input.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter" || ev.key === ",") {
            ev.preventDefault();
            const val = input.value.trim().replace(/,$/, "");
            if (val && !readChipField(field).map(v => v.toLowerCase()).includes(val.toLowerCase())) {
              renderChipField(field, [...readChipField(field), val]);
            }
            input.value = "";
          } else if (ev.key === "Backspace" && !input.value) {
            group.querySelectorAll(".chip").forEach((c, i, a) => { if (i === a.length - 1) c.remove(); });
          }
        });
        input.addEventListener("blur", () => {
          const val = input.value.trim();
          if (val) { renderChipField(field, [...readChipField(field), val]); input.value = ""; }
        });
      });

      document.getElementById("prefs-submit").addEventListener("click", async () => {
        const fd = new FormData(prefsForm);
        const body = {};
        const homeCity   = (fd.get("homeCity") || "").trim();
        const roastLevel = (fd.get("preferredRoastLevel") || "").trim();
        const notes      = (fd.get("notes") || "").trim();
        if (homeCity)   body.homeCity = homeCity;
        if (roastLevel) body.preferredRoastLevel = roastLevel;
        if (notes)      body.notes = notes;
        CHIP_FIELDS.forEach(f => { body[f] = readChipField(f); });
        try {
          await api("/profile", { method: "PATCH", body: authedJsonBody(body) });
          closeModal(prefsModal); toast("Preferences saved"); await loadPreferences();
        } catch (err) { toast(err.message, true); }
      });

      // ── modal wiring ──────────────────────────────────────────────────────
      initModalClose((bg) => {
        if (bg === placeModal) resetPlaceModal();
        if (bg === dupPlaceModal) _dupContext = null;
      });
      initCoffeeGlossary("glossary-btn");

      document.getElementById("refresh").addEventListener("click", loadAll);

      // ── load all ──────────────────────────────────────────────────────────
      async function loadAll() {
        if (!apiInput.value.trim()) {
          placeListEl.innerHTML = '<div class="empty">Set the API URL above to get started.</div>';
          visitListEl.innerHTML = '<div class="empty">Set the API URL above.</div>';
          return;
        }
        await loadPlaces();
        loadVisits(); loadPreferences();
      }

    </script>
  </body>
</html>
