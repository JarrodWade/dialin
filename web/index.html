<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dialin · journal</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      /* ── journal-specific layout ───────────────────────────────────────── */
      main {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 14px; padding: 14px;
        height: calc(100vh - 52px);
      }
      .col { display: flex; flex-direction: column; gap: 14px; min-height: 0; }

      /* chat */
      .messages {
        flex: 1; overflow-y: auto; padding: 14px;
        display: flex; flex-direction: column; gap: 10px;
      }
      .bubble {
        max-width: 85%; padding: 10px 12px; border-radius: 12px;
        font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
        border: 1px solid var(--line);
      }
      .bubble.user { background: #efe4d2; align-self: flex-end; border-bottom-right-radius: 4px; }
      .bubble.bot  { background: #fffaf0; align-self: flex-start; border-bottom-left-radius: 4px; }
      .bubble small { display: block; color: var(--muted); font-size: 11px; margin-top: 4px; }
      .composer {
        display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--line);
      }
      .composer input {
        flex: 1; background: var(--paper); color: var(--ink);
        border: 1px solid var(--line); border-radius: 8px;
        padding: 10px 12px; font-size: 14px;
      }
      .composer button {
        background: var(--accent); color: var(--paper); border: none;
        border-radius: 8px; padding: 0 18px; cursor: pointer; font-size: 14px;
      }
      .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

      /* coffee cards */
      .coffee-list { padding: 10px; overflow-y: auto; flex: 1; }
      .coffee-card {
        background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px;
        padding: 10px 12px; margin-bottom: 8px;
      }
      .coffee-card .row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
      .coffee-card .name {
        font-family: ui-serif, Georgia, serif; font-size: 15px; font-weight: 600;
      }
      .coffee-card .roaster { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
      .coffee-card .meta { color: var(--muted); font-size: 12px; margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
      .coffee-card .actions { display: flex; gap: 6px; margin-top: 8px; }
      .coffee-card button {
        background: transparent; color: var(--accent); border: 1px solid var(--line);
        padding: 3px 9px; border-radius: 6px; font-size: 11px; cursor: pointer;
      }
      .coffee-card button:hover { background: var(--bg); }
      .coffee-card .stock { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink-2); font-size: 12px; }
      .coffee-card.low .stock { color: var(--warn); }

      /* brews */
      .brews { padding: 10px; overflow-y: auto; flex: 1; }
      .brew-row {
        display: grid; grid-template-columns: auto 1fr auto auto;
        gap: 10px; padding: 8px 4px; border-bottom: 1px dashed var(--line); font-size: 13px;
        align-items: start;
      }
      .brew-row:last-child { border-bottom: none; }
      .brew-row .when { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; padding-top: 2px; }
      .brew-row .what { display: flex; flex-direction: column; gap: 2px; }
      .brew-row .what .top { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
      .brew-row .method {
        background: var(--accent); color: var(--paper); padding: 1px 8px;
        border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      }
      .brew-row .params { color: var(--ink-2); font-size: 12px; font-variant-numeric: tabular-nums; }
      .brew-row .taste { color: var(--muted); font-size: 12px; font-style: italic; margin-top: 2px; }
      .brew-row .rating { color: var(--accent-2); font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .brew-row .actions { display: flex; gap: 4px; flex-shrink: 0; }
      .brew-row .actions button {
        background: transparent; color: var(--accent); border: 1px solid var(--line);
        padding: 2px 6px; border-radius: 5px; font-size: 10px; cursor: pointer;
      }
      .brew-row .actions button:hover { background: var(--bg-2); }
      .brew-row .actions button.danger { color: var(--bad); }

      /* ── onboarding overlay ────────────────────────────────────────────── */
      .onboard-overlay {
        position: fixed; inset: 0; z-index: 300;
        background: rgba(43,29,18,0.88);
        display: none; align-items: center; justify-content: center;
        padding: 20px;
      }
      .onboard-overlay.open { display: flex; }
      .onboard-card {
        background: var(--paper); border-radius: 18px;
        padding: 32px 28px; width: 520px; max-width: 100%;
        display: flex; flex-direction: column; gap: 18px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.35);
        border: 1px solid var(--line);
      }
      .onboard-header { text-align: center; }
      .onboard-logo {
        font-family: ui-serif, Georgia, serif;
        font-size: 32px; font-weight: 700; color: var(--accent);
        letter-spacing: -0.02em; margin-bottom: 4px;
      }
      .onboard-sub { margin: 0; color: var(--muted); font-size: 13px; }
      .onboard-divider {
        height: 1px; background: var(--line); margin: 0;
      }
      .onboard-messages {
        display: flex; flex-direction: column; gap: 10px;
        max-height: 260px; overflow-y: auto;
        min-height: 60px;
      }
      .onboard-messages .bubble { max-width: 88%; }
      .onboard-messages .typing {
        align-self: flex-start; color: var(--muted);
        font-size: 13px; font-style: italic; padding: 4px 0;
      }
      .onboard-composer {
        display: flex; gap: 8px;
      }
      .onboard-composer input {
        flex: 1; background: var(--paper); color: var(--ink);
        border: 1px solid var(--line); border-radius: 8px;
        padding: 10px 12px; font-size: 14px;
      }
      .onboard-composer input:focus { outline: none; border-color: var(--accent); }
      .onboard-composer button {
        background: var(--accent); color: var(--paper); border: none;
        border-radius: 8px; padding: 0 18px; cursor: pointer; font-size: 14px;
        white-space: nowrap;
      }
      .onboard-composer button:disabled { opacity: 0.5; cursor: not-allowed; }
      .onboard-footer {
        display: flex; align-items: center; justify-content: space-between;
        padding-top: 4px;
      }
      .onboard-footer .skip-btn {
        background: none; border: none; color: var(--muted);
        font-size: 12px; cursor: pointer; text-decoration: underline;
        padding: 0;
      }
      .onboard-footer .skip-btn:hover { color: var(--ink); }
      .onboard-footer .done-btn {
        background: var(--accent); color: var(--paper); border: none;
        padding: 9px 20px; border-radius: 8px; font-size: 13px;
        font-weight: 600; cursor: pointer; opacity: 0.4;
        transition: opacity 0.2s;
      }
      .onboard-footer .done-btn.ready { opacity: 1; }
      .onboard-progress {
        display: flex; gap: 5px; justify-content: center;
      }
      .onboard-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--line); transition: background 0.3s;
      }
      .onboard-dot.filled { background: var(--accent-2); }
    </style>
  </head>
  <body>
    <header>
      <h1>dialin <span>brew journal</span></h1>
      <nav class="page-nav">
        <a href="index.html" class="active">journal</a>
        <a href="explore.html">explore</a>
      </nav>
      <label>API <input id="api-base" placeholder="https://…execute-api.amazonaws.com" /></label>
      <label>User <input id="user-id" class="user" value="jarrod" /></label>
      <div class="grow"></div>
      <button id="prefs-chip" class="prefs-chip" type="button" title="Edit preferences">
        <span class="dot"></span>
        <span class="text" id="prefs-chip-text">Set your taste preferences →</span>
        <span class="edit">edit</span>
      </button>
      <button id="refresh">Refresh</button>
      <button id="reset" class="ghost">Clear chat</button>
    </header>

    <main>
      <section class="panel">
        <h2>chat</h2>
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <input id="msg" placeholder="Logged a brew? Tell me about it…" autocomplete="off" />
          <button id="send" type="submit">Send</button>
        </form>
      </section>

      <div class="col">
        <section class="panel" style="flex: 1 1 0; min-height: 120px;">
          <h2>my coffees <div class="grow"></div>
            <button class="tiny" id="add-coffee-btn">+ add</button>
          </h2>
          <div id="coffee-list" class="coffee-list"></div>
        </section>

        <section class="panel" style="flex: 0 1 auto; max-height: 26%;">
          <h2>my gear <div class="grow"></div>
            <button class="tiny" id="add-equip-btn">+ add</button>
          </h2>
          <div id="equip-list" class="equip-list"></div>
        </section>

        <section class="panel" style="flex: 1 1 0; min-height: 140px;">
          <h2>recent brews <div class="grow"></div>
            <button class="tiny" id="add-brew-btn">+ log</button>
          </h2>
          <div id="brews" class="brews"></div>
        </section>
      </div>
    </main>

    <!-- Add coffee modal -->
    <div class="modal-bg" id="coffee-modal">
      <div class="modal">
        <h3>Add a coffee</h3>
        <form id="coffee-form" class="grid">
          <label class="full">Roaster
            <select name="roasterId" required><option value="">—</option></select>
          </label>
          <label>Coffee name<input name="name" required placeholder="Wote Ethiopia" /></label>
          <label>Origin<input name="origin" placeholder="Ethiopia" /></label>
          <label>Process<input name="process" placeholder="washed" /></label>
          <label>Roast date<input name="roastDate" type="date" /></label>
          <label>Bag weight (g)<input name="weightG" type="number" step="1" min="0" /></label>
          <label class="full">Notes<textarea name="notes" placeholder="flavor notes from the bag…"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="coffee-submit">Add</button>
        </div>
      </div>
    </div>

    <!-- Add / edit roaster modal (inline add from coffee form) -->
    <div class="modal-bg" id="roaster-modal">
      <div class="modal">
        <h3 id="roaster-modal-title">Add a roaster</h3>
        <form id="roaster-form" class="grid">
          <label>Name<input name="name" required placeholder="Sey" /></label>
          <label>City<input name="city" placeholder="Brooklyn" /></label>
          <label>Country<input name="country" placeholder="US" value="US" /></label>
          <label>Website<input name="website" placeholder="https://seycoffee.com" /></label>
          <label class="full">Notes<textarea name="notes" placeholder="ships fresh, great Ethiopians…"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="roaster-submit">Add</button>
        </div>
      </div>
    </div>

    <!-- Log brew modal -->
    <div class="modal-bg" id="brew-modal">
      <div class="modal">
        <h3>Log a brew</h3>
        <form id="brew-form" class="grid">
          <label class="full">Coffee
            <select name="coffeeId" required></select>
          </label>
          <label>Method
            <select name="method" required>
              <option>V60</option><option>AeroPress</option><option>Espresso</option>
              <option>Chemex</option><option>Kalita</option><option>Origami</option>
              <option>FrenchPress</option><option>Moka</option><option>ColdBrew</option>
            </select>
          </label>
          <label>Rating (1-10)<input name="rating" type="number" min="1" max="10" /></label>
          <label>Dose (g)<input name="doseG" type="number" step="0.1" min="0" /></label>
          <label>Yield / water (g)<input name="yieldG" type="number" step="1" min="0" /></label>
          <label>Time (sec)<input name="timeS" type="number" min="0" /></label>
          <label>Temp (°C)<input name="tempC" type="number" step="0.5" min="0" /></label>
          <label>Grind setting<input name="grind" placeholder="Ode 18" /></label>
          <label>Grinder
            <select name="grinderId"><option value="">—</option></select>
          </label>
          <label>Machine
            <select name="machineId"><option value="">—</option></select>
          </label>
          <label>Brewer
            <select name="brewerId"><option value="">—</option></select>
          </label>
          <label class="full">Taste<input name="taste" placeholder="balanced, sour, bitter…" /></label>
          <label class="full">Notes<textarea name="notes"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="brew-submit">Log</button>
        </div>
      </div>
    </div>

    <!-- Add / edit equipment modal -->
    <div class="modal-bg" id="equip-modal">
      <div class="modal">
        <h3>Add gear</h3>
        <form id="equip-form" class="grid">
          <label>Type
            <select name="equipType" required>
              <option value="GRINDER">Grinder</option>
              <option value="MACHINE">Espresso machine</option>
              <option value="BREWER">Brewer</option>
              <option value="KETTLE">Kettle</option>
            </select>
          </label>
          <label>Name<input name="name" placeholder="Niche Zero" required /></label>
          <label>Brand<input name="brand" placeholder="Niche" /></label>
          <label>Model<input name="model" placeholder="Zero" /></label>
          <label class="full">Notes<textarea name="notes" placeholder="burrs, mods, anything memorable…"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="equip-submit">Add</button>
        </div>
      </div>
    </div>

    <!-- Edit brew modal -->
    <div class="modal-bg" id="brew-edit-modal">
      <div class="modal">
        <h3>Edit brew</h3>
        <form id="brew-edit-form" class="grid">
          <input type="hidden" name="brewId" />
          <label>Method
            <select name="method" required>
              <option>V60</option><option>AeroPress</option><option>Espresso</option>
              <option>Chemex</option><option>Kalita</option><option>Origami</option>
              <option>FrenchPress</option><option>Moka</option><option>ColdBrew</option>
            </select>
          </label>
          <label>Rating (1-10)<input name="rating" type="number" min="1" max="10" /></label>
          <label>Dose (g)<input name="doseG" type="number" step="0.1" min="0" /></label>
          <label>Yield / water (g)<input name="yieldG" type="number" step="1" min="0" /></label>
          <label>Time (sec)<input name="timeS" type="number" min="0" /></label>
          <label>Temp (°C)<input name="tempC" type="number" step="0.5" min="0" /></label>
          <label>Grind setting<input name="grind" placeholder="Ode 18" /></label>
          <label>Grinder<select name="grinderId"><option value="">—</option></select></label>
          <label>Machine<select name="machineId"><option value="">—</option></select></label>
          <label>Brewer<select name="brewerId"><option value="">—</option></select></label>
          <label class="full">Taste<input name="taste" placeholder="balanced, sour, bitter…" /></label>
          <label class="full">Notes<textarea name="notes"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="brew-edit-submit">Save changes</button>
        </div>
      </div>
    </div>

    <!-- Preferences modal -->
    <div class="modal-bg" id="prefs-modal">
      <div class="modal" style="min-width: 440px; max-width: 540px;">
        <h3>Taste preferences</h3>
        <form id="prefs-form" class="grid">
          <label>Home city<input name="homeCity" placeholder="Phoenix, AZ" /></label>
          <label>Roast level
            <select name="preferredRoastLevel">
              <option value="">—</option>
              <option value="light">light</option>
              <option value="medium-light">medium-light</option>
              <option value="medium">medium</option>
              <option value="medium-dark">medium-dark</option>
              <option value="dark">dark</option>
            </select>
          </label>
          <label class="full">Preferred origins
            <div class="chip-input-group" data-field="preferredOrigins">
              <input class="chip-input" placeholder="Ethiopia, Kenya…" />
            </div>
          </label>
          <label class="full">Preferred processes
            <div class="chip-input-group" data-field="preferredProcesses">
              <input class="chip-input" placeholder="washed, natural, anaerobic…" />
            </div>
          </label>
          <label class="full">Favorite roasters
            <div class="chip-input-group" data-field="favoriteRoasters">
              <input class="chip-input" placeholder="Peixoto, Cartel…" />
            </div>
          </label>
          <label class="full">Favorite cafes
            <div class="chip-input-group" data-field="favoriteCafes">
              <input class="chip-input" placeholder="Devoción, Heart…" />
            </div>
          </label>
          <label class="full">Disliked notes
            <div class="chip-input-group" data-field="dislikedNotes">
              <input class="chip-input" placeholder="smoky, ashy…" />
            </div>
          </label>
          <label class="full">Notes<textarea name="notes" placeholder="anything else the bot should remember"></textarea></label>
        </form>
        <div class="modal-actions">
          <button type="button" data-close>Cancel</button>
          <button type="button" class="primary" id="prefs-submit">Save</button>
        </div>
      </div>
    </div>

    <!-- Onboarding overlay (first-time setup) -->
    <div id="onboard-overlay" class="onboard-overlay">
      <div class="onboard-card">
        <div class="onboard-header">
          <div class="onboard-logo">☕ dialin</div>
          <p class="onboard-sub">your specialty coffee dial-in coach</p>
        </div>
        <hr class="onboard-divider" />
        <div id="onboard-messages" class="onboard-messages"></div>
        <form id="onboard-composer" class="onboard-composer">
          <input id="onboard-msg" placeholder="Type your answer…" autocomplete="off" />
          <button id="onboard-send" type="submit">Send</button>
        </form>
        <div class="onboard-progress">
          <div class="onboard-dot" id="odot-0"></div>
          <div class="onboard-dot" id="odot-1"></div>
          <div class="onboard-dot" id="odot-2"></div>
          <div class="onboard-dot" id="odot-3"></div>
        </div>
        <div class="onboard-footer">
          <button class="skip-btn" id="onboard-skip">Skip setup</button>
          <button class="done-btn" id="onboard-done">Done, let's brew! →</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="shared.js"></script>
    <script>
      // ── DOM refs ──────────────────────────────────────────────────────────
      const apiInput    = document.getElementById("api-base");
      const userInput   = document.getElementById("user-id");
      const messagesEl  = document.getElementById("messages");
      const composer    = document.getElementById("composer");
      const msgInput    = document.getElementById("msg");
      const sendBtn     = document.getElementById("send");
      const coffeeListEl = document.getElementById("coffee-list");
      const equipListEl  = document.getElementById("equip-list");
      const brewsEl      = document.getElementById("brews");
      const coffeeForm   = document.getElementById("coffee-form");
      const brewForm     = document.getElementById("brew-form");
      const equipForm    = document.getElementById("equip-form");
      const roasterForm  = document.getElementById("roaster-form");
      const prefsForm    = document.getElementById("prefs-form");
      const coffeeModal  = document.getElementById("coffee-modal");
      const roasterModal = document.getElementById("roaster-modal");
      const brewModal    = document.getElementById("brew-modal");
      const equipModal   = document.getElementById("equip-modal");
      const brewEditModal = document.getElementById("brew-edit-modal");
      const prefsModal   = document.getElementById("prefs-modal");
      const toastEl      = document.getElementById("toast");
      const refreshBtn   = document.getElementById("refresh");

      // ── state ─────────────────────────────────────────────────────────────
      let _equipmentCache = [];
      let _roasterCache   = [];
      let _pendingRoasterSelectField = null;
      let _pendingGearSelectField    = null;
      let _editingBrewId  = null;

      initSharedInputs(
        () => { _onboardBooted = false; loadAll(); },
        () => { _onboardBooted = false; renderChat(); loadAll(); }
      );

      // ── chat ──────────────────────────────────────────────────────────────
      function chatStorageKey() { return "dialin.chat." + (userInput.value.trim() || "_"); }
      function loadChat() {
        try { return JSON.parse(localStorage.getItem(chatStorageKey()) || "[]"); }
        catch { return []; }
      }
      function saveChat(history) { localStorage.setItem(chatStorageKey(), JSON.stringify(history.slice(-40))); }

      function addBubble(role, text) {
        const div = document.createElement("div");
        div.className = "bubble " + (role === "USER" ? "user" : "bot");
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function renderChat() {
        messagesEl.innerHTML = "";
        const hist = loadChat();
        if (!hist.length) {
          messagesEl.innerHTML =
            '<div class="empty">Tell me about a brew, ask for dial-in advice,<br>or have me catalog a new bag.</div>';
          return;
        }
        hist.forEach((m) => addBubble(m.role, m.text));
      }

      composer.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = msgInput.value.trim();
        if (!text) return;
        const history = loadChat();
        addBubble("USER", text);
        msgInput.value = "";
        sendBtn.disabled = true;
        try {
          const data = await api("/chat", {
            method: "POST",
            body: JSON.stringify({ userId: userId(), message: text, history }),
          });
          if (data.history) saveChat(data.history);
          else saveChat([...history, { role: "USER", text }, { role: "BOT", text: data.reply }]);
          addBubble("BOT", data.reply || "(no reply)");
          loadCoffees(); loadEquipment(); loadRoasters(); loadBrews();
        } catch (err) {
          addBubble("BOT", "[error] " + err.message);
        } finally {
          sendBtn.disabled = false;
          msgInput.focus();
        }
      });

      document.getElementById("reset").addEventListener("click", () => {
        localStorage.removeItem(chatStorageKey());
        renderChat();
      });

      // ── coffees ───────────────────────────────────────────────────────────
      async function loadCoffees() {
        if (!apiInput.value.trim()) return;
        try {
          const data = await api(`/coffees?userId=${encodeURIComponent(userId())}`);
          renderCoffees(data.coffees || []);
          fillCoffeeSelect(data.coffees || []);
        } catch (err) {
          coffeeListEl.innerHTML = `<div class="empty">${err.message}</div>`;
        }
      }

      function renderCoffees(items) {
        if (!items.length) {
          coffeeListEl.innerHTML = '<div class="empty">No coffees yet. Click + add.</div>';
          return;
        }
        coffeeListEl.innerHTML = "";
        items.forEach((c) => {
          const ds = daysSince(c.roastDate);
          const card = document.createElement("div");
          const lowStock = c.gramsRemaining != null && c.gramsRemaining < 50;
          card.className = "coffee-card" + (lowStock ? " low" : "");
          card.innerHTML = `
            <div class="row">

      // ── brews ─────────────────────────────────────────────────────────────
      async function loadBrews() {
        if (!apiInput.value.trim()) return;
        try {
          const data = await api(`/brews?userId=${encodeURIComponent(userId())}&limit=20`);
          renderBrews(data.brews || []);
        } catch (err) {
          brewsEl.innerHTML = `<div class="empty">${err.message}</div>`;
        }
      }

      function renderBrews(items) {
        if (!items.length) {
          brewsEl.innerHTML = '<div class="empty">No brews logged yet.</div>';
          return;
        }
        brewsEl.innerHTML = "";
        items.forEach((b) => {
          const dose = b.doseG, yld = b.yieldG ?? b.waterG;
          const ratio = b.ratio ? `1:${Number(b.ratio).toFixed(1)}` : "";
          const time = b.timeS ? `${Math.floor(b.timeS/60)}:${String(b.timeS%60).padStart(2,"0")}` : "";
          const params = [
            dose ? `${dose}g` : "",
            yld  ? `→ ${yld}g` : "",
            ratio, time,
            b.grind ? `grind ${b.grind}` : "",
          ].filter(Boolean).join("  ·  ");

          const row = document.createElement("div");
          row.className = "brew-row";
          row.innerHTML = `
            <div class="when">${fmtTime(b.createdAt)}</div>
            <div class="what">
              <div class="top">
                <span class="method">${escapeHtml(b.method)}</span>
                <span class="params">${escapeHtml(params)}</span>
              </div>
              ${b.taste ? `<div class="taste">${escapeHtml(b.taste)}${b.notes ? " — " + escapeHtml(b.notes) : ""}</div>` : (b.notes ? `<div class="taste">${escapeHtml(b.notes)}</div>` : "")}
            </div>
            <div class="rating">${b.rating ? b.rating + "/10" : ""}</div>
            <div class="actions">
              <button data-action="edit-brew" data-brew='${JSON.stringify(b).replace(/'/g, "&#39;")}'>Edit</button>
              <button data-action="del-brew" data-id="${b.brewId}" class="danger">Del</button>
            </div>
          `;
          brewsEl.appendChild(row);
        });

        brewsEl.querySelectorAll('[data-action="edit-brew"]').forEach((btn) => {
          btn.addEventListener("click", () => openEditBrewModal(JSON.parse(btn.dataset.brew)));
        });
        brewsEl.querySelectorAll('[data-action="del-brew"]').forEach((btn) => {
          btn.addEventListener("click", async () => {
            if (!confirm("Delete this brew permanently?")) return;
            try {
              await api(`/brews/${encodeURIComponent(btn.dataset.id)}?userId=${encodeURIComponent(userId())}`, { method: "DELETE" });
              toast("Brew deleted.");
              await loadBrews();
            } catch (err) { toast(err.message, true); }
          });
        });
      }

        _editingBrewId = b.brewId;

        f.elements.rating.value  = b.rating || "";
        f.elements.doseG.value   = b.doseG  || "";
        f.elements.yieldG.value  = b.yieldG ?? b.waterG ?? "";
        f.elements.timeS.value   = b.timeS  || "";
        f.elements.tempC.value   = b.tempC  || "";
        f.elements.grind.value   = b.grind  || "";
        f.elements.taste.value   = b.taste  || "";

      // ── equipment ─────────────────────────────────────────────────────────

      function fillEquipSelects(items) {

          const sel = brewForm.elements[field];
          if (!sel) continue;

          const sel = brewForm.elements[field];

      function openEditEquipModal(item) {
        _editingEquipId = item.equipId;

        equipForm.elements.name.value  = item.name  || "";

      // ── preferences chip ──────────────────────────────────────────────────
      const CHIP_FIELDS = ["preferredOrigins","preferredProcesses","favoriteRoasters","favoriteCafes","dislikedNotes"];

      function renderPrefsChip(p) {
        const parts = [];
        if (p.homeCity)               parts.push(p.homeCity);
        if (p.preferredRoastLevel)    parts.push(p.preferredRoastLevel + " roasts");
        if (p.preferredOrigins?.length) parts.push(p.preferredOrigins.slice(0,3).join(", "));
        if (p.preferredProcesses?.length) parts.push(p.preferredProcesses.slice(0,2).join("/"));
        document.getElementById("prefs-chip-text").textContent =
          parts.length ? parts.join(" · ") : "Set your taste preferences →";
      }

      async function loadPreferences() {
        if (!apiInput.value.trim()) return;
        try {
          const data = await api(`/profile?userId=${encodeURIComponent(userId())}`);
          renderPrefsChip(data.profile || {});
        } catch { /* silent */ }
      }

      function renderChipField(field, values) {
        const group = prefsForm.querySelector(`.chip-input-group[data-field="${field}"]`);
        if (!group) return;
        group.querySelectorAll(".chip").forEach(c => c.remove());
        const input = group.querySelector(".chip-input");
        values.forEach((v) => {
          const chip = document.createElement("span");
          chip.className = "chip"; chip.dataset.value = v;
          chip.innerHTML = `${escapeHtml(v)}<button type="button" aria-label="remove">×</button>`;
          chip.querySelector("button").addEventListener("click", () => chip.remove());
          group.insertBefore(chip, input);
        });
      }
      function readChipField(field) {
        const group = prefsForm.querySelector(`.chip-input-group[data-field="${field}"]`);
        return group ? [...group.querySelectorAll(".chip")].map(c => c.dataset.value) : [];
      }

      document.getElementById("prefs-chip").addEventListener("click", async () => {
        if (!apiInput.value.trim()) return;
        try {
          const data = await api(`/profile?userId=${encodeURIComponent(userId())}`);
          const p = data.profile || {};
          prefsForm.elements.homeCity.value = p.homeCity || "";
          prefsForm.elements.preferredRoastLevel.value = p.preferredRoastLevel || "";
          prefsForm.elements.notes.value = p.notes || "";
          CHIP_FIELDS.forEach(f => renderChipField(f, p[f] || []));
          openModal(prefsModal);
        } catch (err) { toast(err.message, true); }
      });

      prefsForm.querySelectorAll(".chip-input-group").forEach((group) => {
        const input = group.querySelector(".chip-input");
        const field = group.dataset.field;
        input.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter" || ev.key === ",") {
            ev.preventDefault();
            const val = input.value.trim().replace(/,$/, "");
            if (val && !readChipField(field).map(v => v.toLowerCase()).includes(val.toLowerCase())) {
              renderChipField(field, [...readChipField(field), val]);
            }
            input.value = "";
          } else if (ev.key === "Backspace" && !input.value) {
            group.querySelectorAll(".chip").forEach((c, i, a) => { if (i === a.length - 1) c.remove(); });
          }
        });
        input.addEventListener("blur", () => {
          const val = input.value.trim();
          if (val) { renderChipField(field, [...readChipField(field), val]); input.value = ""; }
        });
      });

      // ── form submit handlers ──────────────────────────────────────────────
      document.getElementById("coffee-submit").addEventListener("click", async () => {
        const fd = new FormData(coffeeForm);
        const body = { userId: userId() };
        for (const [k, v] of fd.entries()) {
          if (!v) continue;
          body[k] = k === "weightG" ? Number(v) : v;
        }
        if (body.roasterId) {
          const r = _roasterCache.find(r => r.roasterId === body.roasterId);
          if (r) body.roaster = r.name;
        }
        try {
          await api("/coffees", { method: "POST", body: JSON.stringify(body) });
          coffeeForm.reset(); closeModal(coffeeModal); toast("Coffee added"); loadCoffees();
        } catch (err) { toast(err.message, true); }
      });

      document.getElementById("brew-submit").addEventListener("click", async () => {
        const fd = new FormData(brewForm);
        const body = { userId: userId() };
        const nums = new Set(["doseG","yieldG","tempC"]);
        const ints = new Set(["rating","timeS"]);
        for (const [k, v] of fd.entries()) {
          if (!v) continue;
          body[k] = nums.has(k) ? Number(v) : ints.has(k) ? parseInt(v,10) : v;
        }
        try {
          await api("/brews", { method: "POST", body: JSON.stringify(body) });
          brewForm.reset(); closeModal(brewModal); toast("Brew logged"); loadBrews(); loadCoffees();
        } catch (err) { toast(err.message, true); }
      });

      document.getElementById("equip-submit").addEventListener("click", async () => {
        const fd = new FormData(equipForm);
        const body = { userId: userId() };
        for (const [k, v] of fd.entries()) { if (v) body[k] = v; }
        try {
          if (_editingEquipId) {
            await api(`/equipment/${encodeURIComponent(_editingEquipId)}`, { method: "PATCH", body: JSON.stringify(body) });
            resetEquipModal(); closeModal(equipModal); toast("Gear updated"); loadEquipment();
          } else {
            const data = await api("/equipment", { method: "POST", body: JSON.stringify(body) });
            const newId = data?.equipment?.equipId;
            resetEquipModal(); closeModal(equipModal); toast("Gear added");
            await loadEquipment();
            if (_pendingGearSelectField && newId) {
              const sel = brewForm.elements[_pendingGearSelectField];
              if (sel) sel.value = newId;
            }
            _pendingGearSelectField = null;
          }
        } catch (err) { toast(err.message, true); }
      });

      document.getElementById("roaster-submit").addEventListener("click", async () => {
        const fd = new FormData(roasterForm);
        const body = { userId: userId() };
        for (const [k, v] of fd.entries()) { if (v) body[k] = v; }
        try {
          if (_editingRoasterId) {
            await api(`/roasters/${encodeURIComponent(_editingRoasterId)}`, { method: "PATCH", body: JSON.stringify(body) });
            resetRoasterModal(); closeModal(roasterModal); toast("Roaster updated"); await loadRoasters();
          } else {
            const data = await api("/roasters", { method: "POST", body: JSON.stringify(body) });
            const newId = data?.roaster?.roasterId;
            resetRoasterModal(); closeModal(roasterModal); toast("Roaster added");
            await loadRoasters();
            if (_pendingRoasterSelectField && newId) {
              const sel = coffeeForm.elements[_pendingRoasterSelectField];
              if (sel) sel.value = newId;
            }
            _pendingRoasterSelectField = null;
          }
        } catch (err) { toast(err.message, true); }
      });

      document.getElementById("prefs-submit").addEventListener("click", async () => {
        const fd = new FormData(prefsForm);
        const body = { userId: userId() };
        const homeCity = (fd.get("homeCity") || "").trim();
        const roastLevel = (fd.get("preferredRoastLevel") || "").trim();
        const notes = (fd.get("notes") || "").trim();
        if (homeCity)    body.homeCity = homeCity;
        if (roastLevel)  body.preferredRoastLevel = roastLevel;
        if (notes)       body.notes = notes;
        CHIP_FIELDS.forEach(f => { body[f] = readChipField(f); });
        try {
          const data = await api("/profile", { method: "PATCH", body: JSON.stringify(body) });
          renderPrefsChip(data.profile || {});
          closeModal(prefsModal); toast("Preferences saved");
        } catch (err) { toast(err.message, true); }
      });

      document.getElementById("brew-edit-submit").addEventListener("click", async () => {
        const f = document.getElementById("brew-edit-form");
        if (!f.reportValidity()) return;
        const fd = new FormData(f);
        const brewId = fd.get("brewId");
        const body = {};
        ["doseG","yieldG","timeS","tempC","rating"].forEach(k => { if (fd.get(k)) body[k] = parseFloat(fd.get(k)); });
        ["method","grind","taste","notes","grinderId","machineId","brewerId"].forEach(k => { if (fd.get(k)) body[k] = fd.get(k); });
        try {
          await api(`/brews/${encodeURIComponent(brewId)}?userId=${encodeURIComponent(userId())}`, {
            method: "PATCH", body: JSON.stringify(body),

        } catch (err) { toast(err.message, true); }

      // ── modal wiring ──────────────────────────────────────────────────────
      initModalClose((bg) => {

        if (bg === roasterModal)  { _pendingRoasterSelectField = null; resetRoasterModal(); }
        if (bg === brewEditModal) _editingBrewId = null;
      });

      document.getElementById("add-coffee-btn").addEventListener("click", () => openModal(coffeeModal));
      document.getElementById("add-brew-btn").addEventListener("click",   () => openModal(brewModal));
      document.getElementById("add-equip-btn").addEventListener("click",  () => openModal(equipModal));
      refreshBtn.addEventListener("click", loadAll);
      wireBrewGearSelects();

      // ── onboarding ────────────────────────────────────────────────────────
      const onboardOverlay  = document.getElementById("onboard-overlay");
      const onboardMessages = document.getElementById("onboard-messages");
      const onboardComposer = document.getElementById("onboard-composer");
      const onboardMsg      = document.getElementById("onboard-msg");
      const onboardSend     = document.getElementById("onboard-send");
      const onboardSkip     = document.getElementById("onboard-skip");
      const onboardDone     = document.getElementById("onboard-done");

      // How many exchanges before "Done" lights up
      const ONBOARD_QUESTIONS = 4;
      // Hidden seed that triggers the bot's welcoming/question flow
      const ONBOARD_SEED =
        "I'm opening dialin for the very first time and need help setting up my taste " +
        "profile. Welcome me warmly (1 sentence), then ask me one question at a time — " +
        "keep each question to a single sentence. Cover: (1) where I'm based, " +
        "(2) what brew methods I use at home, (3) what flavor notes I love in coffee, " +
        "(4) any go-to roasters or cafes. After each answer call update_preferences to " +
        "save it. After question 4 is answered, confirm what you saved in a short list, " +
        "then say I'm all set and can update these anytime from the preferences chip.";

      let _onboardHistory = [];
      let _onboardExchanges = 0;
      let _onboardBooted = false;

      function onboardStorageKey() {
        return "dialin.onboarded." + (userInput.value.trim() || "_");
      }

      function markOnboarded() {
        localStorage.setItem(onboardStorageKey(), "true");
      }

      function needsOnboarding() {
        return !localStorage.getItem(onboardStorageKey()) && apiInput.value.trim();
      }

      function addOnboardBubble(role, text) {
        const div = document.createElement("div");
        div.className = "bubble " + (role === "USER" ? "user" : "bot");
        div.textContent = text;
        onboardMessages.appendChild(div);
        onboardMessages.scrollTop = onboardMessages.scrollHeight;
      }

      function showTyping() {
        const t = document.createElement("div");
        t.className = "typing"; t.id = "onboard-typing"; t.textContent = "thinking…";
        onboardMessages.appendChild(t);
        onboardMessages.scrollTop = onboardMessages.scrollHeight;
        return t;
      }

      function updateDots(n) {
        for (let i = 0; i < ONBOARD_QUESTIONS; i++) {
          document.getElementById(`odot-${i}`)?.classList.toggle("filled", i < n);
        }
        if (n >= ONBOARD_QUESTIONS) onboardDone.classList.add("ready");
      }

      async function startOnboarding() {
        onboardOverlay.classList.add("open");
        onboardMsg.focus();
        if (_onboardBooted) return;
        _onboardBooted = true;

        const typing = showTyping();
        onboardSend.disabled = true;
        try {
          const data = await api("/chat", {
            method: "POST",
            body: JSON.stringify({ userId: userId(), message: ONBOARD_SEED, history: [] }),
          });
          typing.remove();
          _onboardHistory = data.history || [
            { role: "USER", text: ONBOARD_SEED },
            { role: "BOT",  text: data.reply },
          ];
          addOnboardBubble("BOT", data.reply || "Welcome to dialin!");
        } catch (err) {
          typing.remove();
          addOnboardBubble("BOT", "Hey! Welcome to dialin. Let's set up your profile — where are you based?");
        } finally {
          onboardSend.disabled = false;
          onboardMsg.focus();
        }
      }

      onboardComposer.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = onboardMsg.value.trim();
        if (!text) return;
        onboardMsg.value = "";
        addOnboardBubble("USER", text);
        onboardSend.disabled = true;
        const typing = showTyping();
        try {
          const data = await api("/chat", {
            method: "POST",
            body: JSON.stringify({ userId: userId(), message: text, history: _onboardHistory }),
          });
          typing.remove();
          _onboardHistory = data.history || [
            ..._onboardHistory,
            { role: "USER", text },
            { role: "BOT",  text: data.reply },
          ];
          addOnboardBubble("BOT", data.reply || "");
          _onboardExchanges++;
          updateDots(_onboardExchanges);

          // After final exchange, also refresh the prefs chip
          if (_onboardExchanges >= ONBOARD_QUESTIONS) loadPreferences();
        } catch (err) {
          typing.remove();
          addOnboardBubble("BOT", "[error] " + err.message);
        } finally {
          onboardSend.disabled = false;
          onboardMsg.focus();
        }
      });

      function finishOnboarding() {
        onboardOverlay.classList.remove("open");
        markOnboarded();
        // Carry onboarding conversation into the main chat (minus the seed)
        const visible = _onboardHistory.filter(m =>
          m.role !== "USER" || m.text !== ONBOARD_SEED
        );
        if (visible.length) saveChat(visible);
        renderChat();
        loadPreferences();
      }

      onboardDone.addEventListener("click", finishOnboarding);
      onboardSkip.addEventListener("click", () => {
        onboardOverlay.classList.remove("open");
        markOnboarded();
      });

      // ── load all ──────────────────────────────────────────────────────────
      function loadAll() {
        if (!apiInput.value.trim()) {
          coffeeListEl.innerHTML = '<div class="empty">Paste your API URL above to get started.</div>';
          equipListEl.innerHTML  = '<div class="empty">Set the API URL above to load gear.</div>';
          brewsEl.innerHTML      = '<div class="empty">Set the API URL above to load brews.</div>';
          return;
        }
        loadRoasters(); loadCoffees(); loadEquipment(); loadBrews(); loadPreferences();
        // Trigger onboarding on first load if profile not yet set up
        if (needsOnboarding()) {
          setTimeout(startOnboarding, 400); // brief delay so the page paints first
        }
      }

      renderChat();
      loadAll();
    </script>
  </body>
</html>
